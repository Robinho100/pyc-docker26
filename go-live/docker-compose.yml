---
services:
  reverse-proxy:
    image: nginx
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - data-tester
      - game

  game:
    build:
      context: .
      dockerfile: Game
    ports:
      - "3000:80"

  data-tester:
    image: dpage/pgadmin4
    ports:
      - "5000:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: "go@live.com"
      PGADMIN_DEFAULT_PASSWORD: root
    depends_on:
      - database

  database:
    image: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: go-live
      POSTGRES_PASSWORD: root
